tester: search_based  # or 'fuzzing', 'bayesian_optimization', etc.

common:
  seed: None
  termination: "n_gen"
  budget: 5000

search_based:
  pop_size: 100 #100 #50 #50 #200 #200
  n_offspring: 100 #100 #25 #50 # 200 #200
  algorithm: "ga"
  crossover: "sbx"
  mutation: "pm"
  crossover_prob: 0.9
  mutation_prob: 0.9
  problem_name: 'dynamic_testing'
  duplicate_threshold: 0.05

fuzzing:
  algorithm: "ga"
  problem_name: 'uav'
  max_depth: 5
  min_depth: 1


experiment:
  name: "example_experiment-2"
  description: "This is an example experiment configuration."
  output_dir: "experiments"
  log_level: "info"